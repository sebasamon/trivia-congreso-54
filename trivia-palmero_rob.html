<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

    align-items: center;

  }

    z-index: 2;

    display: flex;
    flex-direction: column;
    align-items: center;
  }

    background: rgba(255,255,255,0.96);
    color: #1a1a1a;
    border-radius: 22px;
    padding: 34px 30px;
    width: 100%;
    max-width: 600px;
    box-shadow: 0 16px 50px rgba(0,0,0,0.45);
    border-top: 6px solid #1a7a47;
  }

  h2 { color: #0a5c30; margin-bottom: 6px; font-size: 1.45rem; }
  .subtitle { color: #555; font-size: 0.88rem; margin-bottom: 22px; line-height: 1.5; }

  /* Lema del congreso arriba de la card */
  .event-banner {
    text-align: center;
    margin-bottom: 14px;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }
  .event-banner .lema {
    font-size: 1.05rem;
    font-weight: 800;
    letter-spacing: 0.5px;
  }
  .event-banner .lema span { color: #ffe066; }
  .event-banner .congreso-name {
    font-size: 0.78rem;
    opacity: 0.9;
    margin-top: 2px;
  }

  input[type=text] {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #1a7a47;
    border-radius: 10px;
    font-size: 1rem;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
    background: #f5fbf7;
  }
  input[type=text]:focus { border-color: #0a5c30; background: #fff; }

    background: linear-gradient(135deg, #1a7a47, #0a5c30);
    color: #fff;
    border: none;
    padding: 13px 20px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.4px;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-gold {
    background: linear-gradient(135deg, #e8b800, #c49a00);
    color: #fff;
    margin-top: 10px;
  }
  .btn-outline {
    background: transparent;
    border: 2px solid #1a7a47;
    color: #0a5c30;
    margin-top: 10px;
  }
  .btn-outline:hover { background: #f0f9f4; }

    background: #e0ede6;
    border-radius: 8px;
    height: 9px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .prog-bar {
    background: linear-gradient(90deg, #1a7a47, #ffe066);
    height: 100%;
    border-radius: 8px;
    transition: width 0.4s ease;
  }

  .score-chip {
    display: inline-block;
    background: linear-gradient(135deg, #1a7a47, #0a5c30);
    color: #ffe066;
    font-weight: 800;
    padding: 5px 16px;
    border-radius: 20px;
    font-size: 0.88rem;

    margin-bottom: 18px;

    background: #f4fbf6;
    border: 2px solid #c8e6d4;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 0.96rem;
    transition: all 0.16s;
    text-align: left;
    color: #1a1a1a;

  .opt:hover:not(:disabled) { background: #d4f0e0; border-color: #1a7a47; transform: translateX(3px); }
  .opt.correct { background: #d0f5e2 !important; border-color: #1a7a47 !important; color: #0a5c30; font-weight: 700; }
  .opt.wrong   { background: #ffe4e4 !important; border-color: #d94444 !important; color: #b00; }
  .opt:disabled { cursor: default; transform: none; }

  .feedback {
    font-weight: 700;
    font-size: 0.96rem;
    margin-bottom: 14px;
    padding: 10px 14px;
    border-radius: 9px;
    line-height: 1.4;

  .feedback.fail { background: #ffe4e4; color: #b00; }

  .big-score { font-size: 3.2rem; font-weight: 900; color: #0a5c30; line-height: 1; }

  tr.me td { background: #fffbe6 !important; font-weight: 700; }
  .medal { font-size: 1.1rem; }
  .empty { color: #aaa; font-size: 0.9rem; text-align: center; padding: 24px 0; }

  .divider { height: 1px; background: #e0ede6; margin: 18px 0; }
</style>

}
function saveLB(lb) {

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ── Render ───────────────────────────────────────────────────────
function render() {
  const card = document.getElementById('mainCard');
  if (state.screen === 'welcome') card.innerHTML = welcomeHTML();
  else if (state.screen === 'quiz')   card.innerHTML = quizHTML();
  else if (state.screen === 'result') card.innerHTML = resultHTML();
  else if (state.screen === 'lb')     card.innerHTML = lbHTML();
  attachListeners();
}

function welcomeHTML() {
  return `
    <h2>⚽ Trivia Copa Mundial</h2>
    <p class="subtitle">Pon a prueba tu conocimiento futbolero. Responde 5 preguntas al azar y compite con tus colegas del sector palmero.</p>
    <label style="font-weight:700;color:#0a5c30;font-size:0.93rem;display:block;margin-bottom:6px;">¿Cuál es tu nombre?</label>
    <input type="text" id="nameInput" placeholder="Escribe tu nombre aquí..." maxlength="40">
    <button class="btn" id="startBtn">¡Empezar Trivia! ⚽</button>
    <button class="btn btn-outline" id="lbBtn" style="margin-top:10px;">🏆 Ver Tabla de Líderes</button>
  `;
}

function quizHTML() {
  const q = state.questions[state.current];
  const prog = (state.current / 5) * 100;
  const optsHTML = q.opts.map((o, i) => {
    let cls = 'opt';
    if (state.answered) {
      if (i === q.ans) cls += ' correct';
      else if (i === state.selectedOpt) cls += ' wrong';
    }
    return `<button class="${cls}" data-i="${i}" ${state.answered?'disabled':''}>${String.fromCharCode(65+i)}. ${o}</button>`;
  }).join('');

  const feedbackHTML = state.answered
    ? (state.selectedOpt === q.ans
        ? `<div class="feedback ok">✅ ¡Correcto!</div>`
        : `<div class="feedback fail">❌ Incorrecto. La respuesta correcta era: <strong>${q.opts[q.ans]}</strong></div>`)
    : '';

  return `
    <div class="score-chip">Puntos: ${state.score} / ${state.current}</div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${prog}%"></div></div>
    <div class="q-num">Pregunta ${state.current+1} de 5</div>
    <div class="q-text">${q.q}</div>
    <div class="options">${optsHTML}</div>
    ${feedbackHTML}
    ${state.answered ? `<button class="btn" id="nextBtn">${state.current < 4 ? 'Siguiente →' : 'Ver resultados 🏁'}</button>` : ''}
  `;
}

function resultHTML() {
  const pct = Math.round((state.score / 5) * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🌟' : pct >= 40 ? '👍' : '💪';
  const msg   = pct >= 80 ? '¡Experto mundialista!' : pct >= 60 ? '¡Muy buen resultado!' : pct >= 40 ? '¡Sigue practicando!' : '¡El fútbol guarda secretos para ti!';

  const lb     = loadLB();
  const sorted = [...lb].sort((a,b) => b.score - a.score || a.time - b.time);
  const pos    = sorted.findIndex(e => e.name === state.name && e.score === state.score) + 1;
  const topRows = sorted.slice(0,8).map((e,i) => {
    const medals = ['🥇','🥈','🥉'];
    const isMe = e.name === state.name && e.score === state.score;
    return `<tr class="${isMe?'me':''}">
      <td><span class="medal">${medals[i]||i+1}</span></td>
      <td>${e.name}</td>
      <td style="text-align:center;font-weight:800;color:#0a5c30;">${e.score}/5</td>
    </tr>`;
  }).join('');

  return `
    <h2>${emoji} ${msg}</h2>
    <div class="result-center">
      <div class="big-score">${state.score}<span>/5</span></div>
      <div class="result-meta">${pct}% de aciertos · Posición <strong>#${pos}</strong> en el ranking</div>
    </div>
    <div class="lb-title">🏆 Tabla de Líderes</div>
    ${lb.length === 0
      ? '<p class="empty">Sé el primero en la tabla.</p>'
      : `<table><thead><tr><th>#</th><th>Nombre</th><th>Puntos</th></tr></thead><tbody>${topRows}</tbody></table>`}
    <div class="divider"></div>
    <button class="btn" id="retryBtn">🔄 Jugar de nuevo</button>
    <button class="btn btn-outline" id="lbBtnFull" style="margin-top:10px;">📊 Tabla completa</button>
  `;
}

function lbHTML() {
  const lb     = loadLB();
  const sorted = [...lb].sort((a,b) => b.score - a.score || a.time - b.time);
  const rows   = sorted.slice(0,20).map((e,i) => {
    const medals = ['🥇','🥈','🥉'];
    return `<tr>
      <td><span class="medal">${medals[i]||i+1}</span></td>
      <td>${e.name}</td>
      <td style="text-align:center;font-weight:800;color:#0a5c30;">${e.score}/5</td>
    </tr>`;
  }).join('');
  return `
    <h2>🏆 Tabla de Líderes</h2>
    <p class="subtitle">54° Congreso Nacional de Cultivadores de Palma de Aceite 2026</p>
    ${sorted.length === 0
      ? '<p class="empty">Aún no hay resultados registrados.</p>'
      : `<table><thead><tr><th>#</th><th>Nombre</th><th>Puntos</th></tr></thead><tbody>${rows}</tbody></table>`}
    <div class="divider"></div>
    <button class="btn" id="backBtn">← Volver al inicio</button>
    <button class="btn btn-outline" id="clearBtn" style="margin-top:10px;font-size:0.82rem;padding:9px;">🗑️ Borrar todos los puntajes</button>
  `;
}

// ── Listeners ────────────────────────────────────────────────────
function attachListeners() {
  const $ = id => document.getElementById(id);
  const get = () => { const el = $('nameInput'); return el ? el.value.trim() : ''; };

  $('nameInput') && $('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });
  $('startBtn')  && $('startBtn').addEventListener('click', startGame);
  $('lbBtn')     && $('lbBtn').addEventListener('click', () => { state.screen='lb'; render(); });
  $('lbBtnFull') && $('lbBtnFull').addEventListener('click', () => { state.screen='lb'; render(); });
  $('nextBtn')   && $('nextBtn').addEventListener('click', nextQ);
  $('retryBtn')  && $('retryBtn').addEventListener('click', () => { state.screen='welcome'; render(); });
  $('backBtn')   && $('backBtn').addEventListener('click', () => { state.screen='welcome'; render(); });
  $('clearBtn')  && $('clearBtn').addEventListener('click', () => {
    if (confirm('¿Borrar todos los puntajes?')) { localStorage.removeItem(STORAGE_KEY); render(); }
  });
  document.querySelectorAll('.opt:not([disabled])').forEach(btn =>
    btn.addEventListener('click', () => selectOpt(+btn.dataset.i))
  );
}

function startGame() {
  const inp  = document.getElementById('nameInput');
  const name = inp ? inp.value.trim() : state.name;
  if (!name) { inp && (inp.style.borderColor='#d94444'); return; }
  state.name       = name;
  state.questions  = shuffle(allQuestions).slice(0,5);
  state.current    = 0;
  state.score      = 0;
  state.answered   = false;
  state.selectedOpt = null;
  state.screen     = 'quiz';
  render();
}

function selectOpt(i) {
  if (state.answered) return;
  state.selectedOpt = i;
  state.answered    = true;
  if (i === state.questions[state.current].ans) state.score++;
  render();
}

function nextQ() {
  if (state.current < 4) {
    state.current++;
    state.answered    = false;
    state.selectedOpt = null;
    render();
  } else {
    const lb = loadLB();
    lb.push({ name: state.name, score: state.score, time: Date.now() });
    saveLB(lb);
    state.screen = 'result';
    render();
  }
}

render();
</script>
</body>
</html>
